<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA: decode the path encoded by 404.html
      // e.g. /?/integrations  →  /integrations
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
          window.history.replaceState(
            null,
            null,
            decoded.shift() + (decoded.length ? '?' + decoded.join('&') : '') + l.hash
          )
        }
      })(window.location)
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yorg — Grow. Build. Survive.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
